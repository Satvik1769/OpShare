spring.application.name=OpShare
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=1234
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.show-sql=true

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# AWS S3 Configuration
aws.s3.bucket-name=opshare-files
aws.s3.region=ap-south-1
aws.s3.access-key=${AWS_ACCESS_KEY_ID:}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}
aws.s3.presigned-url-expiration-minutes=260

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKey12345678901234567890123456789012}
jwt.expiration-hours=24

# OTP Configuration
otp.expiration-minutes=5
otp.max-attempts=3
otp.length=6

# TextBee SMS Configuration
textbee.api-url=https://api.textbee.dev/api/v1/gateway/devices
textbee.device-id=${TEXTBEE_DEVICE_ID:}
textbee.api-key=${TEXTBEE_API_KEY:}